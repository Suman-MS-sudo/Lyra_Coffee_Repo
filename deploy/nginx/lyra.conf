# nginx reverse-proxy for the Lyra Next.js webapp.
#
# 1. Copy this file to /etc/nginx/sites-available/lyra
# 2. Replace YOUR_DOMAIN with your real domain (e.g. coffee.example.com).
# 3. sudo ln -s /etc/nginx/sites-available/lyra /etc/nginx/sites-enabled/
# 4. sudo nginx -t && sudo systemctl reload nginx
# 5. Issue a TLS cert:
#       sudo apt install certbot python3-certbot-nginx
#       sudo certbot --nginx -d YOUR_DOMAIN
#    Certbot will edit this file to add the cert paths and an HTTP→HTTPS redirect.

# ── Rate-limit zones (10 req/s burst 20 per IP) ─────────────────────
limit_req_zone $binary_remote_addr zone=lyra_api:10m rate=10r/s;

# ── HTTP → HTTPS redirect (Certbot adds this automatically too) ─────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # ACME challenge for Let's Encrypt renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS / production ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # Certbot fills these two lines:
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Sane upload size for JSON APIs ──────────────────────────────
    client_max_body_size 1m;

    # ── Razorpay webhook needs raw body — passthrough ────────────────
    location = /api/payment/webhook {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_request_buffering off;
        proxy_read_timeout 60s;
    }

    # ── Rate-limited API routes ─────────────────────────────────────
    location /api/ {
        limit_req zone=lyra_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    # ── Long-cache static assets emitted by Next.js ─────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Everything else (pages, _next, public) ──────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}
