; ================================================================
;  Lyra Coffee Machine — PlatformIO Build Configuration
;  Board : ESP32 DevKit C V4  (ESP32-WROOM-32, 38-pin)
;  Framework: Arduino
;
;  Flash : pio run --target upload
;  Monitor: pio device monitor
; ================================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
upload_speed    = 921600

; Stable flash settings for ESP32 DevKit C V4
board_build.flash_mode = dio
board_build.f_flash     = 80000000L

; Required libraries
lib_deps =
    paulstoffregen/OneWire @ ^2.3.7
    milesburton/DallasTemperature @ ^3.11.0
    bodmer/TFT_eSPI @ ^2.5.43
    knolleary/PubSubClient @ ^2.8.0
    bblanchon/ArduinoJson @ ^6.21.3
    ricmoo/QRCode @ ^0.0.1

build_flags =
    -DCORE_DEBUG_LEVEL=1
    ; ── TFT_eSPI driver configuration for ILI9341 2.4" 240×320 ──
    -DILI9341_DRIVER
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=12
    -DTFT_RST=0
    -DTFT_BL=-1
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
